  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ns-serif;color:var(--ink);\n    background:radial-gradient(1200px 700px at 12% -5%,#eaf1f9 0,transparent 55%),radial-gradient(1100px 700px at 100% 110%,#e9f4ee 0,transparent 55%),var(--paper);\n    -webkit-font-smoothing:antialiased}\n  .page{max-width:1120px;margin:0 auto;padding:52px 32px 120px}\n  h1,h2,h3,h4{font-family:'Nunito',sans-serif;letter-spacing:-.4px}\n\n  /* header */\n  .head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;\n    border-bottom:1px solid var(--line);padding-bottom:28px;margin-bottom:10px}\n  .head h1{font-weight:800;font-size:54px;line-height:1;margin:0;background:linear-gradient(120deg,var(--accent),var(--green));-webkit-background-clip:text;background-clip:text;color:transparent}\n  .head .tag{font-size:18px;color:var(--ink-2);margin:10px 0 0}\n  .head .meta{font-size:13px;color:var(--ink-2);line-height:1.6;text-align:right;max-width:330px}\n  .head .meta b{color:var(--ink);font-weight:700}\n  .pill{display:inline-block;border-radius:20px;padding:5px 13px;font-family:'Nunito';font-size:12px;font-weight:800;margin:0 5px 5px 0;background:var(--surface);border:1px solid var(--line);color:var(--ink-2)}\n  .pill.accent{background:var(--accent-soft);border-color:transparent;color:var(--accent)}\n\n  section{margin-top:60px}\n  .sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}\n  .sec-num{font-family:'Nunito';font-weight:800;font-size:34px;color:var(--accent);line-height:1}\n  .sec-title{font-weight:800;font-size:32px;line-height:1;margin:0}\n  .sec-sub{font-size:14.5px;color:var(--ink-2);line-height:1.6;margin:0 0 26px;max-width:780px}\n  .grp{font-family:'Nunito';font-weight:800;font-size:20px;margin:28px 0 14px;color:var(--ink)}\n  .grp:first-child{margin-top:0}\n\n  .panel{background:var(--surface);border:1px solid var(--line);border-radius:24px;box-shadow:var(--sh-1)}\n\n  /* colors */\n  .sw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:16px}\n  .sw{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--surface);box-shadow:var(--sh-1)}\n  .sw .cap{height:92px;display:flex;align-items:flex-end;justify-content:flex-end;padding:9px}\n  .sw .cap .hex{font-family:'Nunito';font-size:11px;font-weight:800;background:rgba(255,255,255,.9);color:#1E2A33;border-radius:7px;padding:3px 7px}\n  .sw .inf{padding:11px 13px}\n  .sw .inf .nm{font-family:'Nunito';font-weight:800;font-size:14px}\n  .sw .inf .use{font-size:11.5px;color:var(--ink-3);margin-top:3px;line-height:1.4}\n  .sw .inf .var{font-size:11px;color:var(--accent);margin-top:5px}\n\n  /* type */\n  .type-row{display:flex;align-items:baseline;gap:22px;padding:18px 20px;border-bottom:1px solid var(--line-2);flex-wrap:wrap}\n  .type-row:last-child{border-bottom:none}\n  .type-spec{flex:0 0 180px;font-size:12px;color:var(--ink-2);line-height:1.55}\n  .type-spec b{display:block;color:var(--ink);font-family:'Nunito';font-weight:800;font-size:13.5px}\n  .type-sample{flex:1;min-width:0}\n  .fN{font-family:'Nunito'} .fA{font-family:'Atkinson Hyperlegible'}\n\n  /* icons */\n  .icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:12px}\n  .ic-cell{border:1px solid var(--line);border-radius:16px;background:var(--surface);padding:16px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:var(--sh-1)}\n  .ic-cell .box{width:52px;height:52px;border-radius:15px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center}\n  .ic-cell .box svg{width:26px;height:26px}\n  .ic-cell .nm{font-family:'Nunito';font-weight:700;font-size:11.5px;color:var(--ink-2)}\n\n  /* components demo */\n  .demo{padding:22px;display:flex;flex-direction:column;gap:22px}\n  .crow{display:flex;gap:14px;flex-wrap:wrap;align-items:center}\n  .clab{font-family:'Nunito';font-size:11.5px;color:var(--ink-3);font-weight:800;text-transform:uppercase;letter-spacing:.06em;width:100%;margin-bottom:-8px}\n\n  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:1px solid var(--line);border-radius:16px;padding:12px 20px;min-height:52px;font-family:'Nunito';font-size:16px;font-weight:800;color:var(--ink);background:var(--surface);box-shadow:var(--sh-1);cursor:pointer}\n  .btn svg{width:20px;height:20px}\n  .btn.primary{background:linear-gradient(135deg,#2f6fc4,#2563B6);color:#fff;border-color:transparent;box-shadow:var(--sh-accent)}\n  .btn.ok{background:linear-gradient(135deg,#34987a,#2E8B57);color:#fff;border-color:transparent}\n  .btn.ghost{background:transparent;box-shadow:none;color:var(--ink-2)}\n  .chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:20px;padding:7px 15px;font-family:'Nunito';font-size:13.5px;font-weight:700;background:var(--surface);color:var(--ink-2)}\n  .chip.on{background:var(--accent-soft);border-color:transparent;color:var(--accent)}\n  .search{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:16px;background:var(--surface);padding:12px 15px;min-width:240px;box-shadow:var(--sh-1);color:var(--ink-3)}\n  .search svg{width:20px;height:20px}\n  .toggle{width:58px;height:32px;border-radius:18px;background:var(--accent);position:relative}\n  .toggle.off{background:var(--line)}\n  .toggle i{position:absolute;top:3px;left:29px;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.2)}\n  .toggle.off i{left:3px}\n  .check{width:32px;height:32px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;color:#fff;background:linear-gradient(135deg,#2f6fc4,#2563B6);box-shadow:0 3px 8px rgba(37,99,182,.3)}\n  .check svg{width:18px;height:18px}\n  .check.empty{background:#fff;border:2px solid var(--line)}\n  .progress{height:12px;border-radius:10px;background:var(--line-2);overflow:hidden;width:230px}\n  .progress span{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,#2f6fc4,#2563B6);width:64%}\n  .progress.ok span{background:linear-gradient(90deg,#34987a,#2E8B57);width:80%}\n  .cardc{border:1px solid var(--line);border-radius:24px;background:var(--surface);padding:16px;width:264px;display:flex;flex-direction:column;gap:9px;box-shadow:var(--sh-1)}\n  .cardc.accent{border-color:transparent;background:linear-gradient(135deg,#2f6fc4,#2563B6);color:#fff;box-shadow:var(--sh-accent)}\n  .cardc h4{margin:0;font-size:20px;font-weight:800} .cardc.accent h4{color:#fff}\n  .cardc p{margin:0;font-size:13px;line-height:1.45;color:var(--ink-2)} .cardc.accent p{color:rgba(255,255,255,.9)}\n  .rowc{display:flex;align-items:center;gap:13px;border:1px solid var(--line);border-radius:18px;padding:12px 14px;background:var(--surface);width:300px;box-shadow:var(--sh-1)}\n  .rowc .ic{width:50px;height:50px;border-radius:14px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px}\n  .rowc .ic svg{width:24px;height:24px}\n  .rowc .m{flex:1} .rowc .m .t{font-family:'Nunito';font-weight:700;font-size:16px} .rowc .m .s{font-size:12px;color:var(--ink-3)}\n  .rowc .chev{color:var(--ink-3)} .rowc .chev svg{width:20px;height:20px}\n\n  /* nav demo */\n  .navdemo{width:300px;border:1px solid var(--line);border-radius:20px;background:var(--surface);display:grid;grid-template-columns:repeat(3,1fr);padding:8px;box-shadow:var(--sh-1)}\n  .navdemo .t{display:flex;flex-direction:column;align-items:center;gap:5px;font-family:'Nunito';font-weight:700;font-size:12px;color:var(--ink-3);padding:6px 0}\n  .navdemo .t .ic{width:34px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:12px}\n  .navdemo .t .ic svg{width:24px;height:24px}\n  .navdemo .t.on{color:var(--accent)} .navdemo .t.on .ic{background:var(--accent-soft);color:var(--accent)}\n\n  /* badges */\n  .badge-grid{display:flex;gap:14px}\n  .badge{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center}\n  .badge .medal{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:27px;background:linear-gradient(140deg,#f6c87a,#e8a14b);box-shadow:0 6px 14px rgba(224,138,75,.32);border:2px solid #fff}\n  .badge.locked .medal{background:var(--line-2);box-shadow:none;filter:grayscale(1);opacity:.6}\n  .badge .bn{font-family:'Nunito';font-weight:700;font-size:11px;color:var(--ink-2)}\n\n  /* skeleton + fab + empty mini */\n  .skel{border-radius:14px;background:linear-gradient(100deg,#eef2f6 30%,#f7fafc 50%,#eef2f6 70%);background-size:200% 100%;animation:sh 1.3s linear infinite}\n  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}\n  .skrow{display:flex;gap:13px;border:1px solid var(--line);border-radius:18px;padding:12px 14px;background:var(--surface);width:300px}\n  .fab{height:56px;padding:0 22px 0 18px;border-radius:30px;border:none;background:linear-gradient(135deg,#2f6fc4,#2563B6);color:#fff;font-family:'Nunito';font-weight:800;font-size:16px;display:inline-flex;align-items:center;gap:9px;box-shadow:var(--sh-accent)}\n  .fab svg{width:22px;height:22px}\n  .emptyc{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;padding:26px;border:1px dashed var(--line);border-radius:20px;background:var(--paper-2);width:300px}\n  .emptyc .ill{width:72px;height:72px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-3)}\n  .emptyc .ill svg{width:36px;height:36px}\n  .emptyc h4{margin:0;font-size:17px;font-weight:800}.emptyc p{margin:0;font-size:13px;color:var(--ink-3)}\n\n  /* pattern cards */\n  .pat-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}\n  .pat{border:1px solid var(--line);border-radius:20px;background:var(--surface);padding:18px;box-shadow:var(--sh-1);display:flex;flex-direction:column;gap:10px}\n  .pat .pt{display:flex;align-items:center;gap:10px}\n  .pat .pt .n{width:30px;height:30px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Nunito';font-weight:800;font-size:14px}\n  .pat h4{margin:0;font-size:17px;font-weight:800}\n  .pat p{margin:0;font-size:13px;color:var(--ink-2);line-height:1.55}\n  .pat .where{font-size:11.5px;color:var(--ink-3);margin-top:2px}\n  .pat .where b{color:var(--accent);font-weight:700}\n\n  /* tokens */\n  .tok-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}\n  .tok{border:1px solid var(--line);border-radius:16px;background:var(--surface);padding:16px;display:flex;flex-direction:column;gap:11px;align-items:center;text-align:center;box-shadow:var(--sh-1)}\n  .tok .nm{font-family:'Nunito';font-weight:700;font-size:12.5px}.tok .vl{font-size:11.5px;color:var(--ink-2)}\n  .rad{width:72px;height:46px;background:var(--accent-soft);border:1px solid #cdddf6}\n  .shd{width:72px;height:46px;background:#fff;border-radius:12px}\n  .spc{background:var(--accent);height:18px;border-radius:4px}\n\n  .two{display:grid;grid-template-columns:1fr 1fr;gap:18px}\n  @media(max-width:760px){.two,.pat-grid{grid-template-columns:1fr}.type-spec{flex-basis:100%}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"page\">\n\n  <div class=\"head\">\n    <div>\n      <h1>Better Life — Sistema de Diseño<\u002Fh1>\n      <p class=\"tag\">App de bienestar para adultos mayores (55–60+) · <b style=\"color:var(--accent)\">Alta fidelidad<\u002Fb><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"meta\">\n      <span class=\"pill accent\">v2.0 · Hi-Fi<\u002Fspan><span class=\"pill\">Nunito + Atkinson<\u002Fspan><span class=\"pill\">Español<\u002Fspan>\n      <br><br><b>Fuente de verdad<\u002Fb> coherente con el prototipo de alta fidelidad: colores, tipografía, iconos SVG, componentes y patrones de diseño.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 01 COLOR -->\n  <section>\n    <div class=\"sec-head\"><span class=\"sec-num\">01<\u002Fspan><h2 class=\"sec-title\">Paleta de color<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">Azul de confianza como primario, verde de bienestar como secundario y un cálido “sol” para logros y rachas. Neutros fríos y limpios. El color siempre acompaña texto e icono — nunca es el único indicador.<\u002Fp>\n\n    <div class=\"grp\">Primario · confianza<\u002Fdiv>\n    <div class=\"sw-grid\">\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#2563B6\"><span class=\"hex\">#2563B6<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Accent<\u002Fdiv><div class=\"use\">Botones primarios, activo, enlaces, foco.<\u002Fdiv><div class=\"var\">--accent<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#1A4C8F\"><span class=\"hex\">#1A4C8F<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Accent Dark<\u002Fdiv><div class=\"use\">Hover / pressed.<\u002Fdiv><div class=\"var\">--accent-dark<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#E7F0FB\"><span class=\"hex\">#E7F0FB<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Accent Soft<\u002Fdiv><div class=\"use\">Fondos seleccionados, tiles, chips activos.<\u002Fdiv><div class=\"var\">--accent-soft<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grp\">Secundario · bienestar<\u002Fdiv>\n    <div class=\"sw-grid\">\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#2E8B6A\"><span class=\"hex\">#2E8B6A<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Green<\u002Fdiv><div class=\"use\">Hábitos, salud, progreso positivo.<\u002Fdiv><div class=\"var\">--green<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#E3F4EC\"><span class=\"hex\">#E3F4EC<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Green Soft<\u002Fdiv><div class=\"use\">Tarjetas de hábito completado.<\u002Fdiv><div class=\"var\">--green-soft<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#E08A4B\"><span class=\"hex\">#E08A4B<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Gold<\u002Fdiv><div class=\"use\">Rachas (🔥), logros, recompensas.<\u002Fdiv><div class=\"var\">--gold<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#FBEBDD\"><span class=\"hex\">#FBEBDD<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Gold Soft<\u002Fdiv><div class=\"use\">Fondos de logros.<\u002Fdiv><div class=\"var\">--gold-soft<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grp\">Neutros y superficies<\u002Fdiv>\n    <div class=\"sw-grid\">\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#1E2A33\"><span class=\"hex\">#1E2A33<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Ink<\u002Fdiv><div class=\"use\">Texto principal, títulos.<\u002Fdiv><div class=\"var\">--ink<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#4F5D69\"><span class=\"hex\">#4F5D69<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Ink 2<\u002Fdiv><div class=\"use\">Texto secundario.<\u002Fdiv><div class=\"var\">--ink-2<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#80909B\"><span class=\"hex\">#80909B<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Ink 3<\u002Fdiv><div class=\"use\">Metadatos, placeholders.<\u002Fdiv><div class=\"var\">--ink-3<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#E4E9EE\"><span class=\"hex\">#E4E9EE<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Line<\u002Fdiv><div class=\"use\">Bordes y divisores.<\u002Fdiv><div class=\"var\">--line<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#EFF3F7;border-bottom:1px solid var(--line)\"><span class=\"hex\">#EFF3F7<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Paper<\u002Fdiv><div class=\"use\">Fondo de la app.<\u002Fdiv><div class=\"var\">--paper<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#FFFFFF;border-bottom:1px solid var(--line)\"><span class=\"hex\">#FFFFFF<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Surface<\u002Fdiv><div class=\"use\">Tarjetas, pantallas, hojas.<\u002Fdiv><div class=\"var\">--surface<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grp\">Semánticos<\u002Fdiv>\n    <div class=\"sw-grid\">\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#2E8B57\"><span class=\"hex\">#2E8B57<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Éxito<\u002Fdiv><div class=\"use\">Logros, completado.<\u002Fdiv><div class=\"var\">--ok<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"cap\" style=\"background:#CC5B43\"><span class=\"hex\">#CC5B43<\u002Fspan><\u002Fdiv><div class=\"inf\"><div class=\"nm\">Alerta<\u002Fdiv><div class=\"use\">Errores, avisos, acción destructiva.<\u002Fdiv><div class=\"var\">--warn<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 TYPE -->\n  <section>\n    <div class=\"sec-head\"><span class=\"sec-num\">02<\u002Fspan><h2 class=\"sec-title\">Tipografía<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">Dos familias accesibles. <b>Nunito<\u002Fb> (redondeada, amable) para títulos y elementos de UI; <b>Atkinson Hyperlegible<\u002Fb> — diseñada para baja visión — para cuerpo y microcopy. Cuerpo nunca menor a 15px (sube a 17px con “Texto más grande”).<\u002Fp>\n    <div class=\"panel\">\n      <div class=\"type-row\"><div class=\"type-spec\"><b>Nunito 800 — Display<\u002Fb>Títulos y números<br>23–28px · interlínea 1.1<\u002Fdiv><div class=\"type-sample fN\" style=\"font-weight:800;font-size:30px\">Hola, María 👋<\u002Fdiv><\u002Fdiv>\n      <div class=\"type-row\"><div class=\"type-spec\"><b>Nunito 700 — UI<\u002Fb>Botones, ítems, tabs<br>16–19px<\u002Fdiv><div class=\"type-sample fN\" style=\"font-weight:700;font-size:20px\">Catálogo de Ejercicios físicos<\u002Fdiv><\u002Fdiv>\n      <div class=\"type-row\"><div class=\"type-spec\"><b>Atkinson 400 — Cuerpo<\u002Fb>Texto y microcopy<br>13–17px · interlínea 1.55<\u002Fdiv><div class=\"type-sample fA\"><div style=\"font-size:15px\">Beber agua a lo largo del día mejora tu energía y concentración.<\u002Fdiv><div style=\"font-size:12.5px;color:var(--ink-3);margin-top:6px\">Pecho · Fácil · ⏱ 8 min<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 ICONS -->\n  <section>\n    <div class=\"sec-head\"><span class=\"sec-num\">03<\u002Fspan><h2 class=\"sec-title\">Iconografía<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">Set de iconos lineales SVG (trazo 2px, vértices redondeados, <code>currentColor<\u002Fcode>) para todo el “chrome” funcional. Las categorías de contenido usan emoji a color dentro de tiles tintados (ilustración amable y reconocible). Iconos siempre con etiqueta visible.<\u002Fp>\n    <div class=\"icon-grid\" id=\"iconGrid\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 COMPONENTS -->\n  <section>\n    <div class=\"sec-head\"><span class=\"sec-num\">04<\u002Fspan><h2 class=\"sec-title\">Componentes<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">Radios amplios, sombras suaves en capas y estados táctiles ≥ 44px (primarios 52–58px). Gradientes sutiles en superficies de acción.<\u002Fp>\n    <div class=\"panel demo\">\n      <div><div class=\"clab\">Botones<\u002Fdiv><div class=\"crow\" style=\"margin-top:12px\">\n        <span class=\"btn primary\"><svg class=\"i-play\"><\u002Fsvg> Acción primaria<\u002Fspan>\n        <span class=\"btn\">Secundaria<\u002Fspan>\n        <span class=\"btn ok\"><svg class=\"i-check\"><\u002Fsvg> Éxito<\u002Fspan>\n        <span class=\"btn ghost\">Ghost<\u002Fspan>\n      <\u002Fdiv><\u002Fdiv>\n      <div><div class=\"clab\">Chips / filtros<\u002Fdiv><div class=\"crow\" style=\"margin-top:12px\">\n        <span class=\"chip on\">Pecho ✓<\u002Fspan><span class=\"chip\">Piernas<\u002Fspan><span class=\"chip\">Brazos<\u002Fspan><span class=\"chip on\">Fácil ✓<\u002Fspan>\n      <\u002Fdiv><\u002Fdiv>\n      <div><div class=\"clab\">Búsqueda &amp; selección<\u002Fdiv><div class=\"crow\" style=\"margin-top:12px\">\n        <span class=\"search\"><svg class=\"i-search\"><\u002Fsvg> Buscar ejercicio…<\u002Fspan>\n        <span class=\"toggle\"><i><\u002Fi><\u002Fspan><span class=\"toggle off\"><i><\u002Fi><\u002Fspan>\n        <span class=\"check\"><svg class=\"i-check\"><\u002Fsvg><\u002Fspan><span class=\"check empty\"><\u002Fspan>\n      <\u002Fdiv><\u002Fdiv>\n      <div><div class=\"clab\">Progreso<\u002Fdiv><div class=\"crow\" style=\"margin-top:12px\">\n        <span class=\"progress\"><span><\u002Fspan><\u002Fspan><span class=\"progress ok\"><span><\u002Fspan><\u002Fspan>\n      <\u002Fdiv><\u002Fdiv>\n      <div><div class=\"clab\">Navegación inferior (3 botones · medio contextual)<\u002Fdiv><div class=\"crow\" style=\"margin-top:12px\">\n        <div class=\"navdemo\">\n          <div class=\"t on\"><span class=\"ic\"><svg class=\"i-home\"><\u002Fsvg><\u002Fspan>Inicio<\u002Fdiv>\n          <div class=\"t\"><span class=\"ic\"><svg class=\"i-dumbbell\"><\u002Fsvg><\u002Fspan>Catálogo<\u002Fdiv>\n          <div class=\"t\"><span class=\"ic\"><svg class=\"i-user\"><\u002Fsvg><\u002Fspan>Perfil<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"navdemo\">\n          <div class=\"t\"><span class=\"ic\"><svg class=\"i-home\"><\u002Fsvg><\u002Fspan>Inicio<\u002Fdiv>\n          <div class=\"t on\"><span class=\"ic\"><svg class=\"i-leaf\"><\u002Fsvg><\u002Fspan>Hábitos<\u002Fdiv>\n          <div class=\"t\"><span class=\"ic\"><svg class=\"i-user\"><\u002Fsvg><\u002Fspan>Perfil<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <div><div class=\"clab\">Tarjetas e ítems<\u002Fdiv><div class=\"crow\" style=\"margin-top:12px;align-items:stretch\">\n        <div class=\"cardc accent\"><h4>💡 Consejo del Día<\u002Fh4><p>Tomar 6 vasos de agua mejora tu energía durante el día.<\u002Fp><\u002Fdiv>\n        <div class=\"cardc\"><h4>🧩 Lógica<\u002Fh4><p>3 de 10 ejercicios completados.<\u002Fp><span class=\"progress\" style=\"width:100%\"><span style=\"width:30%\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"rowc\"><span class=\"ic\">🚶<\u002Fspan><div class=\"m\"><div class=\"t\">Caminata Activa<\u002Fdiv><div class=\"s\">Cardio · Fácil · ⏱ 15 min<\u002Fdiv><\u002Fdiv><span class=\"chev\"><svg class=\"i-chev\"><\u002Fsvg><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 ILUSTRACIONES E IMÁGENES -->\n  <section>\n    <div class=\"sec-head\"><span class=\"sec-num\">05<\u002Fspan><h2 class=\"sec-title\">Ilustraciones e imágenes<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">Estilo y <b>espacios reservados<\u002Fb> para medios. El contenido visual (videos de ejercicio, fotos de consejos, ilustraciones de hábitos) ocupa contenedores de proporción y tamaño definidos para mantener el ritmo de la pantalla y la legibilidad.<\u002Fp>\n\n    <div class=\"grp\">Video de ejercicio · relación 16:9<\u002Fdiv>\n    <div class=\"panel\" style=\"padding:20px;display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start\">\n      <div style=\"flex:0 0 300px;max-width:300px\">\n        <div style=\"position:relative;width:100%;padding-top:56.25%;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#1b2733,#0c1116);box-shadow:var(--sh-2)\">\n          <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center\">\n            <div style=\"width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\"><path d=\"M8 5.5v13l11-6.5z\" fill=\"#2563B6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"clab\" style=\"margin-top:10px\">16:9 · esquinas 16px · fijado arriba (sticky)<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:240px;font-family:'Atkinson Hyperlegible',sans-serif;font-size:14px;color:var(--ink-2);line-height:1.7\">\n        <p style=\"margin:0 0 8px\"><b style=\"font-family:'Nunito';color:var(--ink)\">Reglas<\u002Fb><\u002Fp>\n        • Proporción fija <b>16:9<\u002Fb> (la altura es el 56,25% del ancho); el contenedor reserva ese espacio aunque el video aún no cargue.<br>\n        • Esquinas redondeadas <b>16px<\u002Fb> + sombra <b>sh-2<\u002Fb>.<br>\n        • En “Detalle” y “En ejercicio” el video va <b>fijado arriba (sticky)<\u002Fb>: permanece visible al desplazar para no perder la referencia.<br>\n        • En tableros y vistas estáticas se reemplaza por un <b>placeholder representativo<\u002Fb> (▶ “Video demostrativo del ejercicio”), nunca un embed real.<br>\n        • Cada ejercicio tiene <b>su propio video<\u002Fb> (campo <code>video<\u002Fcode> del ejercicio).\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grp\">Placeholders de imagen e ilustración<\u002Fdiv>\n    <div class=\"panel\" style=\"padding:20px;display:flex;gap:18px;flex-wrap:wrap\">\n      <div style=\"flex:1;min-width:150px\">\n        <div style=\"height:120px;border-radius:18px;border:1px solid var(--line);background:linear-gradient(135deg,#eaf0f6,#f2f6fa);display:flex;align-items:center;justify-content:center;font-size:40px\">⛰️<\u002Fdiv>\n        <p class=\"clab\" style=\"margin-top:10px\">Foto / consejo · alto 176px (.ph.tall)<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:150px\">\n        <div style=\"height:120px;border-radius:18px;border:1px solid var(--line);background:linear-gradient(135deg,#eaf0f6,#f2f6fa);display:flex;align-items:center;justify-content:center;font-size:40px\">💧<\u002Fdiv>\n        <p class=\"clab\" style=\"margin-top:10px\">Ilustración de hábito · alto 120px (.ph.med)<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:150px;display:flex;flex-direction:column;align-items:center;gap:8px;justify-content:flex-start\">\n        <div style=\"display:flex;gap:10px\">\n          <div style=\"width:60px;height:60px;border-radius:18px;background:#FBE6E0;color:#CC5B43;display:flex;align-items:center;justify-content:center;font-size:30px\">❤️<\u002Fdiv>\n          <div style=\"width:60px;height:60px;border-radius:18px;background:#E7F0FB;color:#2563B6;display:flex;align-items:center;justify-content:center;font-size:30px\">💪<\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"clab\" style=\"text-align:center\">Tiles de categoría · emoji 30px sobre fondo tintado<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"sec-sub\" style=\"margin-top:18px\"><b>Estilo:<\u002Fb> emoji a color como ilustración amable y reconocible para el público mayor, siempre dentro de contenedores con esquinas redondeadas y, cuando aplica, fondo tintado del color semántico de la categoría. Las fotos reales usan los mismos contenedores y proporciones.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 06 PATTERNS -->\n  <section>\n    <div class=\"sec-head\"><span class=\"sec-num\">06<\u002Fspan><h2 class=\"sec-title\">Patrones de diseño<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">Patrones de UX reconocidos implementados en el prototipo para guiar, dar feedback y reducir la carga cognitiva del público objetivo.<\u002Fp>\n    <div class=\"pat-grid\">\n      <div class=\"pat\"><div class=\"pt\"><span class=\"n\">1<\u002Fspan><h4>Onboarding<\u002Fh4><\u002Fdiv><p>Intro de bienvenida de 3 pasos en el primer uso, con ilustración, dots de progreso y opción “Saltar”.<\u002Fp><div class=\"where\">Aparece en: <b>primer arranque<\u002Fb><\u002Fdiv><\u002Fdiv>\n      <div class=\"pat\"><div class=\"pt\"><span class=\"n\">2<\u002Fspan><h4>Empty state<\u002Fh4><\u002Fdiv><p>Estado vacío con ilustración, mensaje claro y acción de salida cuando una búsqueda/filtro no arroja resultados.<\u002Fp>\n        <div class=\"emptyc\" style=\"width:auto\"><div class=\"ill\"><svg class=\"i-search\"><\u002Fsvg><\u002Fdiv><h4>Sin resultados<\u002Fh4><p>Prueba con otra búsqueda o quita los filtros.<\u002Fp><\u002Fdiv>\n        <div class=\"where\">Aparece en: <b>Catálogo → Resultados<\u002Fb><\u002Fdiv><\u002Fdiv>\n      <div class=\"pat\"><div class=\"pt\"><span class=\"n\">3<\u002Fspan><h4>Skeleton loading<\u002Fh4><\u002Fdiv><p>Esqueletos con animación shimmer mientras cargan las listas, en lugar de una pantalla en blanco.<\u002Fp>\n        <div class=\"skrow\"><div class=\"skel\" style=\"width:50px;height:50px;border-radius:14px;flex:0 0 50px\"><\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center\"><div class=\"skel\" style=\"height:13px;width:60%\"><\u002Fdiv><div class=\"skel\" style=\"height:11px;width:38%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"where\">Aparece en: <b>Catálogo y Gimnasio (listas)<\u002Fb><\u002Fdiv><\u002Fdiv>\n      <div class=\"pat\"><div class=\"pt\"><span class=\"n\">4<\u002Fspan><h4>Confirm dialog<\u002Fh4><\u002Fdiv><p>Diálogo modal de confirmación antes de acciones importantes o destructivas, con icono, acción primaria y cancelar.<\u002Fp><div class=\"where\">Aparece en: <b>Perfil → Cerrar sesión<\u002Fb><\u002Fdiv><\u002Fdiv>\n      <div class=\"pat\"><div class=\"pt\"><span class=\"n\">5<\u002Fspan><h4>Logros / Gamificación<\u002Fh4><\u002Fdiv><p>Medallas, rachas y puntos para reforzar el progreso de forma positiva y motivadora.<\u002Fp>\n        <div class=\"badge-grid\"><div class=\"badge\"><div class=\"medal\">🔥<\u002Fdiv><div class=\"bn\">7 días<\u002Fdiv><\u002Fdiv><div class=\"badge\"><div class=\"medal\">💧<\u002Fdiv><div class=\"bn\">Hidratada<\u002Fdiv><\u002Fdiv><div class=\"badge locked\"><div class=\"medal\">🔒<\u002Fdiv><div class=\"bn\">Maratón<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"where\">Aparece en: <b>Perfil · Resultados<\u002Fb><\u002Fdiv><\u002Fdiv>\n      <div class=\"pat\"><div class=\"pt\"><span class=\"n\">6<\u002Fspan><h4>FAB · acción flotante<\u002Fh4><\u002Fdiv><p>Botón de acción flotante persistente para la acción principal de la sección (crear/añadir).<\u002Fp>\n        <div><span class=\"fab\"><svg class=\"i-plus\"><\u002Fsvg> Nuevo<\u002Fspan><\u002Fdiv>\n        <div class=\"where\">Aparece en: <b>Hábitos<\u002Fb><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"sec-sub\" style=\"margin-top:18px\">Patrones adicionales ya presentes: <b>navegación inferior<\u002Fb>, <b>búsqueda &amp; filtros<\u002Fb> (popover), <b>divulgación progresiva<\u002Fb> (bottom sheets), <b>carrusel<\u002Fb> y <b>notificaciones toast<\u002Fb>.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 07 TOKENS -->\n  <section>\n    <div class=\"sec-head\"><span class=\"sec-num\">07<\u002Fspan><h2 class=\"sec-title\">Espaciado, radios y sombra<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">Escala de espaciado en múltiplos suaves; radios generosos para una sensación amable; sombras suaves en capas que dan profundidad real (reemplazan el “sello” del wireframe).<\u002Fp>\n    <div class=\"two\">\n      <div>\n        <div class=\"grp\">Radios<\u002Fdiv>\n        <div class=\"tok-grid\">\n          <div class=\"tok\"><div class=\"rad\" style=\"border-radius:9px\"><\u002Fdiv><div class=\"nm\">9 px<\u002Fdiv><div class=\"vl\">checkbox<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"rad\" style=\"border-radius:14px\"><\u002Fdiv><div class=\"nm\">12–14 px<\u002Fdiv><div class=\"vl\">iconos, tiles<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"rad\" style=\"border-radius:18px\"><\u002Fdiv><div class=\"nm\">16–18 px<\u002Fdiv><div class=\"vl\">botones, listas<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"rad\" style=\"border-radius:24px\"><\u002Fdiv><div class=\"nm\">24 px<\u002Fdiv><div class=\"vl\">tarjetas<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"rad\" style=\"border-radius:30px\"><\u002Fdiv><div class=\"nm\">30 px<\u002Fdiv><div class=\"vl\">hojas, FAB, pill<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"grp\">Espaciado<\u002Fdiv>\n        <div class=\"tok-grid\">\n          <div class=\"tok\"><div class=\"spc\" style=\"width:6px\"><\u002Fdiv><div class=\"nm\">6<\u002Fdiv><div class=\"vl\">mínimo<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"spc\" style=\"width:10px\"><\u002Fdiv><div class=\"nm\">10<\u002Fdiv><div class=\"vl\">chips/botones<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"spc\" style=\"width:14px\"><\u002Fdiv><div class=\"nm\">14<\u002Fdiv><div class=\"vl\">en tarjetas<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"spc\" style=\"width:16px\"><\u002Fdiv><div class=\"nm\">16<\u002Fdiv><div class=\"vl\">pantalla<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"spc\" style=\"width:24px\"><\u002Fdiv><div class=\"nm\">24<\u002Fdiv><div class=\"vl\">secciones<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grp\">Sombra (profundidad en capas)<\u002Fdiv>\n    <div class=\"tok-grid\" style=\"grid-template-columns:repeat(auto-fill,minmax(180px,1fr))\">\n      <div class=\"tok\"><div class=\"shd\" style=\"box-shadow:var(--sh-1)\"><\u002Fdiv><div class=\"nm\">sh-1<\u002Fdiv><div class=\"vl\">tarjetas en reposo<\u002Fdiv><\u002Fdiv>\n      <div class=\"tok\"><div class=\"shd\" style=\"box-shadow:var(--sh-2)\"><\u002Fdiv><div class=\"nm\">sh-2<\u002Fdiv><div class=\"vl\">hover / elevado<\u002Fdiv><\u002Fdiv>\n      <div class=\"tok\"><div class=\"shd\" style=\"box-shadow:var(--sh-3)\"><\u002Fdiv><div class=\"nm\">sh-3<\u002Fdiv><div class=\"vl\">diálogos, hojas<\u002Fdiv><\u002Fdiv>\n      <div class=\"tok\"><div class=\"shd\" style=\"box-shadow:var(--sh-accent)\"><\u002Fdiv><div class=\"nm\">sh-accent<\u002Fdiv><div class=\"vl\">botones primarios<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 A11Y -->\n  <section>\n    <div class=\"sec-head\"><span class=\"sec-num\">08<\u002Fspan><h2 class=\"sec-title\">Accesibilidad (adultos mayores)<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">Principios no negociables, pensados para personas de 55–60+ con poca experiencia en móviles.<\u002Fp>\n    <div class=\"two\">\n      <div class=\"panel\" style=\"padding:18px\"><div class=\"grp\" style=\"margin-top:0\">Reglas<\u002Fdiv>\n        <p class=\"fA\" style=\"font-size:14px;color:var(--ink-2);line-height:1.75;margin:0\">\n        • <b style=\"color:var(--ink)\">Targets táctiles<\u002Fb> ≥ 44px; primarios 52–58px.<br>\n        • <b style=\"color:var(--ink)\">Texto<\u002Fb> ≥ 15px; sube a ≥17px con “Texto más grande”.<br>\n        • <b style=\"color:var(--ink)\">Iconos + etiqueta<\u002Fb> siempre; nunca un icono solo.<br>\n        • <b style=\"color:var(--ink)\">Tipografía hiperlegible<\u002Fb> (Atkinson) en textos largos.<br>\n        • <b style=\"color:var(--ink)\">Lenguaje directo<\u002Fb>, verbos en infinitivo.<br>\n        • <b style=\"color:var(--ink)\">Navegación<\u002Fb> de 3 destinos + “← Volver” ancho.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"panel\" style=\"padding:18px\"><div class=\"grp\" style=\"margin-top:0\">Modos<\u002Fdiv>\n        <p class=\"fA\" style=\"font-size:14px;color:var(--ink-2);line-height:1.75;margin:0\">\n        • <b style=\"color:var(--ink)\">Texto más grande<\u002Fb> — escala toda la UI.<br>\n        • <b style=\"color:var(--ink)\">Alto contraste<\u002Fb> — neutros más oscuros, bordes 2px.<br>\n        • <b style=\"color:var(--ink)\">Comandos de voz<\u002Fb> — marcar hábitos hablando.<br><br>\n        Se activan en <b style=\"color:var(--ink)\">Perfil → Accesibilidad<\u002Fb> y afectan toda la app.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<script>\n// SVG icon paths — coherentes con icons.jsx del prototipo\nconst P = {\n  home:'<path d=\"M3 11.5 12 4l9 7.5\"/><path d=\"M5.5 10v9.5h13V10\"/>',\n  back:'<path d=\"M19 12H5\"/><path d=\"M11 6 5 12l6 6\"/>',\n  user:'<circle cx=\"12\" cy=\"8\" r=\"4\"/><path d=\"M4.5 20c0-4 3.4-6 7.5-6s7.5 2 7.5 6\"/>',\n  search:'<circle cx=\"10.5\" cy=\"10.5\" r=\"6.5\"/><path d=\"M15.5 15.5 21 21\"/>',\n  filter:'<path d=\"M4 7h16M4 12h16M4 17h16\"/><circle cx=\"9\" cy=\"7\" r=\"2\" fill=\"currentColor\" stroke=\"none\"/><circle cx=\"15\" cy=\"12\" r=\"2\" fill=\"currentColor\" stroke=\"none\"/><circle cx=\"8\" cy=\"17\" r=\"2\" fill=\"currentColor\" stroke=\"none\"/>',\n  play:'<path d=\"M8 5.5v13l11-6.5z\" fill=\"currentColor\" stroke=\"none\"/>',\n  pause:'<rect x=\"7\" y=\"5\" width=\"3.4\" height=\"14\" rx=\"1.2\" fill=\"currentColor\" stroke=\"none\"/><rect x=\"13.6\" y=\"5\" width=\"3.4\" height=\"14\" rx=\"1.2\" fill=\"currentColor\" stroke=\"none\"/>',\n  close:'<path d=\"M6 6l12 12\"/><path d=\"M18 6 6 18\"/>',\n  check:'<path d=\"M5 12.5 10 17.5 19 7\"/>',\n  heart:'<path d=\"M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.4-7 10-7 10z\"/>',\n  share:'<circle cx=\"6\" cy=\"12\" r=\"2.4\"/><circle cx=\"18\" cy=\"6\" r=\"2.4\"/><circle cx=\"18\" cy=\"18\" r=\"2.4\"/><path d=\"M8.1 10.9 15.9 7.1M8.1 13.1l7.8 3.8\"/>',\n  bell:'<path d=\"M6 9a6 6 0 0 1 12 0c0 4 1.6 5 2 6H4c.4-1 2-2 2-6z\"/><path d=\"M10 19a2 2 0 0 0 4 0\"/>',\n  help:'<circle cx=\"12\" cy=\"12\" r=\"9\"/><path d=\"M9.4 9.5a2.7 2.7 0 0 1 5.2 1c0 1.8-2.6 2.2-2.6 4\"/><circle cx=\"12\" cy=\"17.2\" r=\"1\" fill=\"currentColor\" stroke=\"none\"/>',\n  chev:'<path d=\"M9.5 6 15.5 12l-6 6\"/>',\n  plus:'<path d=\"M12 5v14M5 12h14\"/>',\n  voice:'<rect x=\"9\" y=\"3\" width=\"6\" height=\"11\" rx=\"3\"/><path d=\"M6 11a6 6 0 0 0 12 0M12 17v4\"/>',\n  dumbbell:'<path d=\"M6.5 9v6M4 8v8M17.5 9v6M20 8v8M6.5 12h11\"/>',\n  brain:'<path d=\"M9.2 6.6A2.4 2.4 0 0 1 13.6 5a2.4 2.4 0 0 1 4.3 2 2.4 2.4 0 0 1 .6 4.2 2.4 2.4 0 0 1-1 4.4 2.4 2.4 0 0 1-3.9 1 2.4 2.4 0 0 1-4.4-1 2.4 2.4 0 0 1-1-4.4 2.4 2.4 0 0 1 .9-4.6z\"/><path d=\"M12 5.6v12.8\"/>',\n  leaf:'<path d=\"M5 19c0-8 6-14 14-14 0 8-6 14-14 14z\"/><path d=\"M9 15 15 9\"/>'\n};\nconst NAMES = {home:'Inicio',back:'Volver',user:'Perfil',search:'Buscar',filter:'Filtrar',play:'Iniciar',pause:'Pausar',close:'Cerrar',check:'Listo',heart:'Favorito',share:'Compartir',bell:'Notificar',help:'Ayuda',chev:'Avanzar',plus:'Añadir',voice:'Voz',dumbbell:'Catálogo',brain:'Gimnasio',leaf:'Hábitos'};\nfunction svg(name,cls){\n  return '<svg '+(cls?('class=\"'+cls+'\" '):'')+'viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">'+(P[name]||'')+'<\u002Fsvg>';\n}\n// build icon grid\ndocument.getElementById('iconGrid').innerHTML = Object.keys(P).map(n =>\n  '<div class=\"ic-cell\"><div class=\"box\">'+svg(n)+'<\u002Fdiv><div class=\"nm\">'+NAMES[n]+'<\u002Fdiv><\u002Fdiv>'\n).join('');\n// hydrate inline component svgs by class i-<name>\ndocument.querySelectorAll('svg[class^=\"i-\"]').forEach(el=>{\n  const n = el.getAttribute('class').replace('i-','');\n  const wrap = document.createElement('span'); wrap.innerHTML = svg(n);\n  const s = wrap.firstChild;\n  s.setAttribute('width', el.getAttribute('width')||'20'); s.setAttribute('height', el.getAttribute('height')||'20');\n  el.replaceWith(s);\n});\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
